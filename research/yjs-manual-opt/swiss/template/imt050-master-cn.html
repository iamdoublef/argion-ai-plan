<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{product.model}} {{product.name_cn}} 使用说明书 — {{brand.display_name}}</title>
<style>
{{> shared/cn/core-shell.css}}
{{> shared/base/imt050-booklet.css}}
</style>
</head>
<body>

<!-- ═══════════ PAGE 1 — COVER ═══════════ -->
<div class="page" style="display:flex;flex-direction:column;justify-content:space-between;padding:15mm 10mm 10mm;">
  <div>
    <div class="cover-brand"><span></span>{{brand.display_name}}</div>
  </div>
  <div style="flex:1;display:flex;flex-direction:column;justify-content:center;align-items:flex-start;padding:0 0 8mm;">
    <div style="text-align:left;margin:0 0 8mm;">
      <img src="./{{images_dir}}/{{product.cover_image}}" alt="{{product.model}} {{product.name_cn}}" style="width:auto;height:auto;max-height:48mm;max-width:68%;">
    </div>
    <div class="cover-model">MODEL {{product.model}}</div>
    <div class="cover-title">{{product.name_cn}}</div>
    <div class="cover-subtitle">使用说明书</div>
    <div class="cover-divider"></div>
  </div>
  {{> shared/cn/cover-bottom.html}}
</div>

<!-- ═══════════ PAGE 2 — TOC ═══════════ -->
<div class="page">
  <div class="header-strip">
    <div class="header-brand">{{brand.display_name}}</div>
    <div class="header-ref">{{product.model}} — 使用说明书</div>
  </div>
  <div class="toc-title">目录</div>
    {{#AUTO_TOC}}

  <div class="page-footer"><span>{{brand.display_name}} {{product.model}} 使用说明书</span><span>2</span></div>
</div>

{{#DOCUMENT_BODY}}

</body>
</html>
