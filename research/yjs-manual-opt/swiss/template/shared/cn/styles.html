<style>
{{> shared/cn/core-shell.css}}

:root {
    --swiss-black: #000000;
    --swiss-red: #E63946;
    --swiss-gray-bg: #F2F2F7;
    --swiss-gray-text: #8E8E93;
    --page-margin: 12.7mm;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html { font-size: 14px; }
body {
    background: #2C2C2E;
    color: var(--swiss-black);
    font-family: "Helvetica Neue", "Inter", Arial, "PingFang SC", "Microsoft YaHei", sans-serif;
    -webkit-font-smoothing: antialiased;
}

.page {
    width: 210mm;
    min-height: 297mm;
    padding: var(--page-margin);
    background: #FFF;
    margin: 10mm auto;
    position: relative;
    page-break-after: always;
}

.header-strip { border-top: 5px solid var(--swiss-black); padding-top: 10px; display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 20px; }
.header-brand { font-weight: 900; letter-spacing: 2px; font-size: 13px; text-transform: uppercase; }
.header-ref { font-family: "Courier New", monospace; font-size: 10px; color: var(--swiss-gray-text); }

.section-title { font-size: 26px; font-weight: 900; text-transform: uppercase; margin: 0 0 16px; letter-spacing: -0.5px; border-left: 6px solid var(--swiss-black); padding-left: 12px; }
.section-title .chapter-num { color: var(--swiss-red); margin-right: 8px; }
.sub-title { font-size: 14px; font-weight: 700; border-bottom: 2px solid var(--swiss-black); padding-bottom: 4px; margin: 20px 0 12px; text-transform: uppercase; letter-spacing: 0.5px; }

p { font-size: 13px; line-height: 1.65; margin-bottom: 10px; color: #222; }

.steps { list-style: none; padding: 0; margin: 10px 0; }
.steps li { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 8px; font-size: 13px; line-height: 1.6; }
.step-num { flex-shrink: 0; width: 22px; height: 22px; background: var(--swiss-black); color: #FFF; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 900; margin-top: 1px; }

.bullet-list { list-style: none; padding: 0; margin: 8px 0; }
.bullet-list li { padding: 3px 0 3px 16px; position: relative; font-size: 13px; line-height: 1.65; }
.bullet-list li::before { content: "—"; position: absolute; left: 0; color: var(--swiss-red); font-weight: 900; font-size: 11px; }

.warning-box { border: 2px solid var(--swiss-red); padding: 12px 16px; margin: 14px 0; }
.warning-box .box-title { font-size: 11px; font-weight: 900; color: var(--swiss-red); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; }
.caution-box { border: 2px solid #000; padding: 12px 16px; margin: 14px 0; }
.caution-box .box-title { font-size: 11px; font-weight: 900; color: #000; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; }
.note-box { background: var(--swiss-gray-bg); padding: 10px 14px; margin: 12px 0; border-left: 4px solid var(--swiss-gray-text); font-size: 12px; color: #444; }
.note-box .box-title { font-weight: 900; color: #333; margin-bottom: 4px; text-transform: uppercase; font-size: 11px; letter-spacing: 0.5px; }
.box-list { list-style: none; padding: 0; }
.box-list li { padding: 2px 0 2px 14px; position: relative; font-size: 12px; line-height: 1.6; }
.box-list li::before { content: "·"; position: absolute; left: 2px; color: var(--swiss-red); font-weight: 900; }

.fig-wrap { text-align: center; margin: 14px 0; }
.fig-wrap img { max-width: 80%; max-height: 70mm; object-fit: contain; display: inline-block; }
.fig-caption { font-size: 10px; color: var(--swiss-gray-text); margin-top: 4px; text-align: center; font-family: "Courier New", monospace; text-transform: uppercase; letter-spacing: 0.5px; }

table { width: 100%; border-collapse: collapse; margin: 12px 0; font-size: 12px; }
th { background: var(--swiss-black); color: #FFF; padding: 8px 10px; text-align: left; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; }
td { border: 1px solid #CCC; padding: 7px 10px; color: #1A1A1A; vertical-align: top; }
tr:nth-child(even) td { background: var(--swiss-gray-bg); }

.btn-name { display: inline-block; background: #FFF; border: 1.5px solid var(--swiss-black); padding: 1px 6px; font-size: 11px; font-family: "Courier New", monospace; color: #000; font-weight: 700; white-space: nowrap; }

.toc-title { font-size: 28px; font-weight: 900; text-transform: uppercase; margin-bottom: 24px; letter-spacing: -1px; }
.toc-item { display: flex; justify-content: space-between; align-items: baseline; padding: 6px 0; border-bottom: 1px solid #EEE; font-size: 13px; }
.toc-chapter { color: var(--swiss-red); font-weight: 900; margin-right: 8px; font-family: "Courier New", monospace; }
.toc-name { flex: 1; }
.toc-page { color: var(--swiss-gray-text); font-family: "Courier New", monospace; font-size: 12px; }

.callout-no { display: inline-block; min-width: 16px; font-weight: 700; }

.compact-accessories .sub-title { margin: 12px 0 6px; }
.compact-accessories .steps li { margin-bottom: 6px; line-height: 1.5; }
.compact-accessories .bullet-list li { padding-top: 1px; padding-bottom: 1px; line-height: 1.5; }
.compact-accessories .btn-name { font-size: 11px; padding: 0 4px; }

.compact-ops .sub-title { margin: 11px 0 6px; }
.compact-ops .steps li { margin-bottom: 5px; line-height: 1.5; }
.compact-ops .note-box { margin: 8px 0; padding: 8px 12px; font-size: 12px; }

.compact-troubleshoot table { font-size: 12px; margin: 8px 0; }
.compact-troubleshoot th, .compact-troubleshoot td { padding-top: 5px; padding-bottom: 5px; }

.compact-warranty .sub-title { margin: 12px 0 6px !important; font-size: 14px; }
.compact-warranty p { margin-bottom: 8px; line-height: 1.55; }
.compact-warranty .bullet-list li { padding-top: 1px; padding-bottom: 1px; line-height: 1.5; }
.compact-warranty table { margin: 8px 0; font-size: 12px; }
.compact-warranty th, .compact-warranty td { padding-top: 5px; padding-bottom: 5px; }
.compact-warranty .fig-wrap { margin: 4px 0 2px !important; }
.compact-warranty .fig-wrap img { max-height: 6mm !important; }

.rollbag-guide .bullet-list { margin: 6px 0; }
.rollbag-guide .bullet-list li { line-height: 1.55; padding-top: 2px; padding-bottom: 2px; }
.rollbag-stack { display: flex; flex-direction: column; gap: 8mm; margin-top: 8px; align-items: center; break-inside: avoid; page-break-inside: avoid; }
.rollbag-figure { width: 100%; text-align: center; break-inside: avoid; page-break-inside: avoid; }
.rollbag-figure img { width: 100%; max-width: 114mm; height: auto; display: inline-block; }

@media print {
  .compact-accessories .sub-title { margin: 10px 0 5px; }
  .compact-accessories .steps li { margin-bottom: 5px; }
  .compact-ops .sub-title { margin: 9px 0 5px; }
  .compact-ops .steps li { margin-bottom: 4px; }
  .compact-troubleshoot table { font-size: 11.5px; margin: 6px 0; }
  .compact-troubleshoot th, .compact-troubleshoot td { padding-top: 4px; padding-bottom: 4px; }
  .compact-warranty { font-size: 13px; line-height: 1.5; }
  .compact-warranty table { margin: 6px 0; font-size: 11.5px; }
  .compact-warranty th, .compact-warranty td { padding-top: 4px; padding-bottom: 4px; }
  .rollbag-stack { gap: 6mm; margin-top: 6px; }
  .rollbag-figure img { max-width: 108mm; }
}

.page-footer { position: absolute; bottom: 6mm; left: var(--page-margin); right: var(--page-margin); border-top: 1px solid #EEE; padding-top: 6px; display: flex; justify-content: space-between; font-size: 10px; color: var(--swiss-gray-text); font-family: "Courier New", monospace; }

.cover-brand { font-size: 13px; font-weight: 900; letter-spacing: 4px; text-transform: uppercase; }
.cover-brand span { display: inline-block; width: 28px; height: 4px; background: var(--swiss-red); margin-right: 8px; vertical-align: middle; }
.cover-model { font-size: 11px; font-weight: 900; letter-spacing: 4px; color: var(--swiss-red); text-transform: uppercase; margin-bottom: 6px; font-family: "Courier New", monospace; }
.cover-title { font-size: 52px; font-weight: 900; color: var(--swiss-black); line-height: 0.95; margin-bottom: 4px; text-transform: uppercase; letter-spacing: -2px; }
.cover-subtitle { font-size: 16px; font-weight: 400; color: var(--swiss-gray-text); margin-bottom: 0; text-transform: uppercase; letter-spacing: 2px; }
.cover-divider { width: 40px; height: 4px; background: var(--swiss-red); margin: 14px 0; }
.cover-bottom { border-top: 2px solid var(--swiss-black); padding-top: 8px; font-size: 10px; color: var(--swiss-gray-text); line-height: 1.6; font-family: "Courier New", monospace; }

@media print {
  body { background: #FFF; }
  .page { margin: 0; }
}
</style>
