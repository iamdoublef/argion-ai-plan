<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{product.model}} {{product.name_en}} User Manual — {{brand.display_name}}</title>
<style>
{{> shared/en/core-shell.css}}
{{> shared/base/v23-booklet.css}}
{{> shared/base/v23-longtext.css}}
</style>
</head>
<body>

<!-- ========== 封面页 ========== -->
<div class="page" style="display:flex;flex-direction:column;justify-content:space-between;padding:15mm 10mm 10mm;">
  <div>
    <div class="cover-brand"><span></span>{{brand.display_name}}</div>
  </div>
  <div style="flex:1;display:flex;flex-direction:column;justify-content:center;align-items:flex-start;padding:0 0 10mm;">
    <div style="text-align:left;margin:0 0 8mm;">
      <img src="./{{images_dir}}/{{product.cover_image}}" alt="{{product.model}} {{product.name_en}}" style="width:auto;height:auto;max-height:54mm;max-width:85%;">
    </div>
    <div class="cover-model">MODEL {{product.model}}</div>
    <div class="cover-title">{{product.name_en}}</div>
    <div class="cover-subtitle">User Manual</div>
    <div class="cover-divider"></div>
  </div>
  {{> shared/en/cover-bottom.html}}
</div>

<!-- ========== 目录页 ========== -->
<div class="page">
  <div class="header-strip">
    <div class="header-brand">{{brand.display_name}}</div>
    <div class="header-ref">{{product.model}} — USER MANUAL</div>
  </div>
  <div class="toc-title">Contents</div>
    {{#AUTO_TOC}}

  <div class="page-footer"><span>{{brand.display_name}} {{product.model}} User Manual</span><span>2</span></div>
</div>

{{#DOCUMENT_BODY}}

</body>
</html>
